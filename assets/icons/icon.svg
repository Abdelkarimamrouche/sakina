<svg
  xmlns="http://www.w3.org/2000/svg"
  width="128" height="128"
  viewBox="0 0 100 100"
>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6c63ff"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="shield-fill" x1="0%" y1="0%" x2="100%" y2="110%">
      <stop offset="0%" stop-color="#7c75ff"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="100" height="100" rx="21" fill="url(#bg)"/>

  <!-- Shield shape -->
  <path
    d="M50 14 L82 27 L82 52 C82 68 66 80 50 87 C34 80 18 68 18 52 L18 27 Z"
    fill="url(#shield-fill)"
    stroke="rgba(255,255,255,0.2)"
    stroke-width="1.32"
  />

  <!-- Musical note (simplified at small sizes) -->
  <g fill="white" opacity="0.95">
    <!-- Note head 1 -->
    <ellipse cx="42" cy="62" rx="5.5" ry="4" transform="rotate(-15,42,62)"/>
    <!-- Note stem 1 -->
    <rect x="46.5" y="38" width="3" height="25"/>
    <!-- Note head 2 -->
    <ellipse cx="60" cy="58" rx="5.5" ry="4" transform="rotate(-15,60,58)"/>
    <!-- Note stem 2 -->
    <rect x="64.5" y="34" width="3" height="25"/>
    <!-- Beam connecting stems -->
    <rect x="46.5" y="38" width="21" height="3.5" rx="1"/>
  </g>

  <!-- Mute slash — diagonal line crossing the note -->
  <line
    x1="28" y1="72"
    x2="75" y2="30"
    stroke="white"
    stroke-width="2.4200000000000004"
    stroke-linecap="round"
    opacity="0.95"
  />
  <!-- Slash shadow for depth -->
  <line
    x1="29" y1="73"
    x2="76" y2="31"
    stroke="rgba(0,0,0,0.25)"
    stroke-width="1.32"
    stroke-linecap="round"
  />
</svg>